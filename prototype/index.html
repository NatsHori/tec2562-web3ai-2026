<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Desktop Cleaner</title>
  </head>
  <body>
    <div id="app">
      <div class="dashboard glass-panel">
        <div class="dashboard-header">
          <h1>Smart Desktop</h1>
          <p>AI-Powered Workspace Optimizer</p>
        </div>
        
        <div class="score-cards">
          <div class="score-card" id="clutter-card">
            <div class="score-info">
              <h3>デスクトップの散らかり度</h3>
            </div>
            <div class="score-value bad" id="clutter-score">98<span>%</span></div>
          </div>
          
          <div class="score-card" id="load-card">
            <div class="score-info">
              <h3>PC負荷スコア</h3>
            </div>
            <div class="score-value bad" id="load-score">85<span>%</span></div>
          </div>

          <div class="score-card" id="time-card">
            <div class="score-info">
              <h3>ファイル探索時間（推定）</h3>
            </div>
            <div class="score-value bad" id="time-score">45<span>秒/回</span></div>
          </div>
        </div>

        <button id="cleanup-btn" class="cleanup-btn">
          ✨ Auto Clean Up
        </button>
      </div>

      <div class="desktop-area glass-panel">
        <div class="icons-container" id="desktop-icons"></div>
        <div class="smart-folders" id="smart-folders">
          <div class="smart-folder" id="folder-docs">
            <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" alt="Documents">
            <span>Documents</span>
          </div>
          <div class="smart-folder" id="folder-images">
            <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" alt="Images">
            <span>Images</span>
          </div>
          <div class="smart-folder" id="folder-projects">
            <img src="https://cdn-icons-png.flaticon.com/512/716/716665.png" alt="Projects">
            <span>Projects</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
